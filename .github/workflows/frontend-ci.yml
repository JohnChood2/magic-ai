name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # NOTE: npm cache disabled until frontend/package-lock.json is
          # committed. Once you've run `npm install` locally and pushed the
          # lockfile, re-enable by adding:
          #   cache: npm
          #   cache-dependency-path: frontend/package-lock.json
          # and switch the install step below to `npm ci`.

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          BACKEND_URL: http://localhost:8000
