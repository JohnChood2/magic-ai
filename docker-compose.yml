# Local dev orchestration for MagicGPT.
# Run with: docker compose up --build
#
# Services:
#   backend   FastAPI app on :8000
#   frontend  Next.js dev server on :3000
#
# Both services hot-reload via mounted source.

services:
  backend:
    build:
      context: ./backend
    container_name: magicgpt-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENV=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: magicgpt-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
